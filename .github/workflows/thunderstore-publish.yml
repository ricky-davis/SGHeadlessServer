name: Thunderstore Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (SemVer). Defaults to release tag (without leading v) or Directory.Build.props."
        required: false
        type: string
      dryrun:
        description: "Echo commands instead of executing them"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DRYRUN: ${{ inputs.dryrun || 'false' }}
      REFROOT_PATH: ${{ github.workspace }}/sg-refroot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout SGRefRoot
        uses: actions/checkout@v4
        with:
          repository: ricky-davis/SGRefRoot
          path: sg-refroot
          token: ${{ secrets.SGREFROOT_TOKEN }}
          fetch-depth: 1

      - name: Validate SGRefRoot layout
        run: |
          test -d "$REFROOT_PATH/Il2CppAssemblies"
          test -d "$REFROOT_PATH/net6"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Resolve package version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          TAG_VERSION="${{ github.event.release.tag_name }}"
          FILE_VERSION="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' LobbyKit/Directory.Build.props)"

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -n "$TAG_VERSION" ]; then
            VERSION="${TAG_VERSION#v}"
          else
            VERSION="$FILE_VERSION"
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z-]+)?$'; then
            echo "Resolved version is not valid SemVer: $VERSION" >&2
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: |
          dotnet restore LobbyKit/LobbyKit.csproj -p:RefRoot="$REFROOT_PATH"

      - name: Build
        run: |
          dotnet build LobbyKit/LobbyKit.csproj -c Release --no-restore -p:DeployMod=false -p:RefRoot="$REFROOT_PATH"

      - name: Install Thunderstore CLI
        run: |
          dotnet tool install --global tcli

      - name: Add global dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build Thunderstore package
        run: |
          tcli build --config-path thunderstore.toml --package-version "${{ steps.version.outputs.value }}"

      - name: Publish to Thunderstore
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.THUNDERSTORE_TOKEN }}
        run: |
          if [ "$DRYRUN" = "true" ]; then
            echo "tcli publish --config-path thunderstore.toml --package-version \"${{ steps.version.outputs.value }}\""
          else
            tcli publish --config-path thunderstore.toml --package-version "${{ steps.version.outputs.value }}"
          fi
